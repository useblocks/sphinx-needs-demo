# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version and other tools you might need
build:
  os: ubuntu-22.04
  apt_packages:
    - default-jdk
    - graphviz
    # Required by Gaphor (PyGObject + Cairo) for the .. diagram:: directive.
    # See https://docs.gaphor.org/en/latest/sphinx.html#read-the-docs
    - libgirepository-2.0-dev
    - libcairo2-dev
    - pkg-config
    - python3-dev
    - gir1.2-pango-1.0
  tools:
    python: "3.12"
    # You can also specify other tool versions:
    # nodejs: "19"
    # rust: "1.64"
    # golang: "1.19"
  jobs:
    pre_create_environment:
      - echo "DOT details"
      - which dot
    post_create_environment:
      # ubt-sphinx is only available on the private pypi.useblocks.com index, not on PyPI.
      # RTD's pip install uses PyPI by default, so we pre-install it here before the main install runs.
      - pip install --extra-index-url https://pypi.useblocks.com/ "ubt-sphinx==0.7.1"
# Build documentation in the "docs/" directory with Sphinx
sphinx:
  configuration: docs/conf.py
  fail_on_warning: true

# Optionally build your docs in additional formats such as PDF and ePub
# formats:
#    - pdf
#    - epub

# Optional but recommended, declare the Python requirements required
# to build your documentation
# See https://docs.readthedocs.io/en/stable/guides/reproducible-builds.html
# Dependencies are installed via uv sync in post_create_environment
python:
   install:
   - method: pip
     path: .
