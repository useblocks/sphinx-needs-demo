# Link types for connecting needs to each other.
# Replaces deprecated needs_extra_links (v7 migration).
# Docs: https://sphinx-needs.readthedocs.io/en/latest/configuration.html#needs-links
[needs.links.links]
outgoing = "links outgoing"
incoming = "links incoming"
copy = false
color = "#000000"

[needs.links.parent_needs]
outgoing = "parent needs"
incoming = "child needs"
copy = false
color = "#333333"

# team -> person
[needs.links.persons]
incoming = "is working for"
outgoing = "persons"

# req -> release
[needs.links.release]
incoming = "contains"
outgoing = "release"

# req -> author
[needs.links.author]
incoming = "ownes"
outgoing = "author"

# req -> req, release -> release
[needs.links.based_on]
incoming = "supports"
outgoing = "based on"

# spec -> req
[needs.links.reqs]
incoming = "specified by"
outgoing = "specifies"

# impl -> spec, component, interface
[needs.links.implements]
incoming = "implemented by"
outgoing = "implements"

# arch -> arch
[needs.links.depends_on]
incoming = "depended by"
outgoing = "depends_on"

# arch -> arch
[needs.links.realizes]
incoming = "realized by"
outgoing = "realizes"


# test_case -> spec
[needs.links.spec]
incoming = "test_cases"
outgoing = "specs"

# test_case -> test_run
# Automatically link test-runs with test-cases via tr_link dynamic function.
# Docs: https://sphinx-test-reports.readthedocs.io/en/latest/functions.html#tr-link
[needs.links.runs]
incoming = "test_cases"
outgoing = "runs"
predicates = [["type=='test'", "[[tr_link('id', 'case_name')]]"]]

# test_case -> spec
[needs.links.specs]
incoming = "test_cases"
outgoing = "specs"

# safety_goal -> hazard
[needs.links.mitigates]
incoming = "mitigated by"
outgoing = "mitigates"
color = "#DC143C"

# fsr -> safety_goal
[needs.links.derives_from]
incoming = "decomposed to"
outgoing = "derives from"
color = "#FF8C00"

# component -> interface (lollipop provider side)
[needs.links.provides]
incoming = "provided by"
outgoing = "provides"
color = "#16a085"
style = "bold"
style_start = "-"
style_end = "-"

# component -> interface (socket consumer side)
[needs.links.consumes]
incoming = "consumed by"
outgoing = "consumes"
color = "#3498db"
style = "dashed"
style_start = "-"
style_end = "-("

# component -> interface: component uses (consumes) an interface
# Arrow direction: component -> interface (consumer is higher-level, drawn above)
[needs.links.uses]
incoming = "used by"
outgoing = "uses"
color = "#3498db"
style = "dashed"
style_start = "-"
style_end = "-("

# interface -> component: interface is provided by a component
# Arrow direction: interface -> component (interface is drawn above providing component)
[needs.links.provided_by]
incoming = "provides"
outgoing = "provided by"
color = "#16a085"
style = "bold"
style_start = "-"
style_end = "-"

# component -> seq_msg -> component: used for needsequence startup sequence
[needs.links.startup_calls]
outgoing = "sends"
incoming = "sent by"
copy = false
color = "#27ae60"

# component -> seq_msg -> component: used for needsequence safety shutdown sequence
[needs.links.shutdown_calls]
outgoing = "sends"
incoming = "sent by"
copy = false
color = "#c0392b"

# see https://sphinx-needs.readthedocs.io/en/latest/configuration.html#needs-layouts
[needs.layouts.adas]
grid = "simple_footer"

[needs.layouts.adas.layout]
head = [
  "<<meta(\"type_name\")>>: **<<meta(\"title\")>>** <<meta_id()>>  <<collapse_button(\"meta\", collapsed=\"icon:arrow-down-circle\", visible=\"icon:arrow-right-circle\", initial=False)>> ",
]
meta = [
  "<<meta_all(no_links=True, exclude=['constraints_error'])>>",
  "<<meta_links_all()>>",
]
footer = ["**Status**: <<meta('status')>>"]

[needs.layouts.req_constraint]
grid = "simple_footer"

[needs.layouts.req_constraint.layout]
head = [
  "<<meta(\"type_name\")>>: **<<meta(\"title\")>>** <<meta_id()>>  <<collapse_button(\"meta\", collapsed=\"icon:arrow-down-circle\", visible=\"icon:arrow-right-circle\", initial=False)>> ",
]
meta = [
  "<<meta_all(no_links=True, exclude=['constraints_error'])>>",
  "<<meta_links_all()>>",
]
footer = ["**Process feedback**: <<meta('constraints_error')>>"]

[needs.layouts.test]
grid = "simple"

[needs.layouts.test.layout]
head = [
  "<<meta(\"type_name\")>>: **<<meta(\"title\")>>** <<meta_id()>>  <<collapse_button(\"meta\", collapsed=\"icon:arrow-down-circle\", visible=\"icon:arrow-right-circle\", initial=False)>> ",
]
meta = ["<<meta_all(no_links=True)>>", "<<meta_links_all()>>"]

[needs.layouts.safety]
grid = "simple_footer"

[needs.layouts.safety.layout]
head = [
  "<<meta(\"type_name\")>>: **<<meta(\"title\")>>** <<meta_id()>>  <<collapse_button(\"meta\", collapsed=\"icon:arrow-down-circle\", visible=\"icon:arrow-right-circle\", initial=False)>> ",
]
meta = [
  "<<meta_all(no_links=True, exclude=['constraints_error'])>>",
  "<<meta_links_all()>>",
]
footer = ["**ASIL**: <<meta('asil')>>"]

# see https://sphinx-needs.readthedocs.io/en/latest/configuration.html#needs-string-links
[needs.string_links.config_link]
# Adds link to the Sphinx-Needs configuration page
link_name = "Sphinx-Needs docs for {{value | replace(\"_\", \"-\") }}"
link_url = "https://sphinx-needs.readthedocs.io/en/latest/configuration.html#{{value | replace(\"_\", \"-\")}}"
options = ["config"]
regex = "^(?P<value>\\w+)$"

[needs.string_links.github_link]
# Links to the related github issue
link_name = "SN Demo #{{value}}"
link_url = "https://github.com/useblocks/sphinx-needs-demo/issues/{{value}}"
options = ["github"]
regex = "^(?P<value>\\w+)$"

[needs.string_links.jira_link]
# Links to the related jira issue
link_name = "JIRA ADAS #{{value}}"
link_url = "https://useblocks.atlassian.net/browse/ADAS-{{value}}"
options = ["jira"]
regex = "^(?P<value>\\w+)$"

# see https://sphinx-needs.readthedocs.io/en/latest/configuration.html#needs-services
[needs.services.github-issues]
id_prefix = "GH_ISSUE_"
max_amount = 2
max_content_lines = 20
need_type = "swreq"
url = "https://api.github.com/"

[needs.services.github-prs]
id_prefix = "GH_PR_"
max_amount = 2
max_content_lines = 20
need_type = "impl"
url = "https://api.github.com/"

# ubCode setting: add custom extensions
[parse.extend_directives.uml]
# see https://github.com/sphinx-contrib/plantuml
description = "Render UML diagrams"
argument = true
content_required = false
parse_content = false
content = true
options = true

[parse.extend_directives.if-builder]
# see https://sphinx-simplepdf.readthedocs.io/en/latest/directives.html#if-builder
description = "Sphinx-SimplePDF builder specific content"
argument = true
argument_required = true
content = true
content_required = true
options = false

[parse.extend_directives.button-link]
# see https://sphinx-design.readthedocs.io/en/latest/badges_buttons.html#buttons
# not yet part of ubCode internal directives
description = "Sphinx-Design button with link"
argument = true
argument_required = true
content = true
content_required = true
options = true

# see https://sphinx-needs.readthedocs.io/en/latest/configuration.html#needs-import-keys
[needs.import_keys]
imported_project = "/needs_import.json"

# External needs originate from external systems, like JIRA or other requirement tracking systems.
# They can be referenced using :need: roles, can be linked to by other needs and they
# can appear in visualisations (tables, needflow, ...).
# They can be picked up from remote URLs or also pre-downloaded outside of Sphinx/Sphinx-Needs and
# then referenced by a local path. This use case is configured below.
# A difference of external needs to imported needs (needimport directive) is that a needs.json
# produced by a project will never contain external needs as they are not part of the project.
# Imported needs however are treated the same way as locally defined needs in rst (or md).
# See https://sphinx-needs.readthedocs.io/en/latest/configuration.html#needs-external-needs
[[needs.external_needs]]
json_path = "./needs_external.json"
# use this to download from a remote
# json_url = "https://sphinx-needs.readthedocs.io/en/latest/needs.json"
base_url = "https://example.com"
target_url = "{{need['id']}}"

# ubCode setting: display a needs.json file in the extension view
[needs_json]
path = "./_build/html/needs.json"
src = "."

# ubCode setting: run a script command
[scripts]
sphinx = "sphinx-build -b html . _build/html"

[parse]
ignore_directives = [
  "test-file",
  "src-trace",
  "test-report"
]

###############################################################################
# SPHINX-CODELINKS Configuration
###############################################################################
# Configuration for linking source code to sphinx-needs artifacts
# see https://codelinks.useblocks.com/

[codelinks]
# Configuration for source tracing
set_local_url = true            # Enable local code html and URL generation
local_url_field = "local-url"   # Need's field name for local URL
set_remote_url = true           # Enable remote url generation
remote_url_field = "remote-url" # Need's field name for remote URL

# Configuration for the coffee-machine Rust project
[codelinks.projects.coffee_machine]
remote_url_pattern = "https://github.com/useblocks/sphinx-needs-demo/blob/{commit}/{path}#L{line}"

[codelinks.projects.coffee_machine.source_discover]
src_dir = "../crates"  # Relative path to Rust source
gitignore = true
comment_type = "rust"

[codelinks.projects.coffee_machine.analyse]
get_need_id_refs = false      # Don't extract need ID references (just for simple linking)
get_oneline_needs = true      # Extract oneline need definitions from code

[codelinks.projects.coffee_machine.analyse.oneline_comment_style]
start_sequence = "@ "         # Start sequence: "// @ "
field_split_char = ","        # Separator between fields
# Define the fields in the oneline comments
needs_fields = [
  { "name" = "title", "type" = "str" },
  { "name" = "id", "type" = "str" },
  { "name" = "type", "type" = "str", "default" = "impl" },
  { "name" = "implements", "type" = "list[str]", "default" = [] },
]
