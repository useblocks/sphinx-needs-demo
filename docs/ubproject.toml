"$schema" = "https://ubcode.useblocks.com/ubproject.schema.json"

[project]
name = "Emergency Braking Demo"
version = "1.0.0"
description = "Episode 1 demo — X-as-Code Foundations"

[needs]
id_required = true
id_regex = "^[A-Z][A-Z0-9_-]{3,}$"

# Point to the schema validation rules
schema_definitions_from_json = "schemas.json"

# Need types
[[needs.types]]
directive = "sys"
title = "System Requirement"
prefix = "SYS_"
color = "#cc6600"
style = "node"

[[needs.types]]
directive = "req"
title = "Requirement"
prefix = "R_"
color = "#5599dd"
style = "node"

[[needs.types]]
directive = "spec"
title = "Specification"
prefix = "S_"
color = "#E4FF3D"
style = "node"

[[needs.types]]
directive = "test"
title = "Test Case"
prefix = "T_"
color = "#4caf50"
style = "node"

[[needs.types]]
directive = "impl"
title = "Implementation"
prefix = "I_"
color = "#9c27b0"
style = "node"

# Custom field: safety integrity level (enum-validated via schemas.json)
[needs.fields.safety_level]
description = "ASIL safety integrity level (ISO 26262)"

[needs.fields.safety_level.schema]
type = "string"
enum = ["QM", "ASIL-A", "ASIL-B", "ASIL-C", "ASIL-D"]

# Custom link types
[needs.links.satisfies]
incoming = "is satisfied by"
outgoing = "satisfies"
copy = false

[needs.links.implements]
incoming = "is implemented by"
outgoing = "implements"
copy = false

[needs.links.verifies]
incoming = "verifies"
outgoing = "verified by"
copy = false

[needs.links.tests]
incoming = "is tested by"
outgoing = "tests"
copy = false

[needs.links.covers]
incoming = "is covered by"
outgoing = "covers"
copy = false

[server]
index_on_save = true

[parse]
ignore_directives = [
  "test-file",
  "src-trace"
]

###############################################################################
# SPHINX-CODELINKS Configuration
###############################################################################
# Configuration for linking source code to sphinx-needs artifacts
# see https://codelinks.useblocks.com/

[codelinks]
# Configuration for source tracing
set_local_url = true            # Enable local code html and URL generation
local_url_field = "local-url"   # Need's field name for local URL
set_remote_url = true           # Enable remote url generation
remote_url_field = "remote-url" # Need's field name for remote URL

# Configuration for the braking_control Rust project
[codelinks.projects.braking_control]
remote_url_pattern = "https://github.com/useblocks/sphinx-needs-demo/blob/{commit}/{path}#L{line}"

[codelinks.projects.braking_control.source_discover]
src_dir = "../crates"  # Relative path to Rust source
gitignore = true
comment_type = "rust"

[codelinks.projects.braking_control.analyse]
get_need_id_refs = false      # Don't extract need ID references (just for simple linking)
get_oneline_needs = true      # Extract oneline need definitions from code
comment_type = "rust"          # Rust uses C++-style comments

[codelinks.projects.braking_control.analyse.oneline_comment_style]
start_sequence = "@ "         # Start sequence: "// @ "
field_split_char = ","        # Separator between fields
# Define the fields in the oneline comments
needs_fields = [
  { "name" = "title", "type" = "str" },
  { "name" = "id", "type" = "str" },
  { "name" = "type", "type" = "str", "default" = "impl" },
  { "name" = "implements", "type" = "list[str]", "default" = [] },
]
