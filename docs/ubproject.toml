"$schema" = "https://ubcode.useblocks.com/ubproject.schema.json"

# This is the Sphinx-Needs configuration file in TOML format.
# It is announced to Sphinx-Needs by putting
#   needs_from_toml = "ubproject.toml"
# into conf.py.
# This is required to make the project work with ubCode.
# For details see https://ubcode.useblocks.com
# Also a declarative configuration format is generally a good idea.

[server]
index_on_save = true

[project]
name = "Sphinx-Needs Demo"
description = "Showcases for working with Sphinx-Needs"
srcdir = "."

[format_rst]
fail_on_warning = []
validate = true
blockquote_indent = 2
definition_list_indent = 2
directive_indent = 3
enum_list_auto = "preserve"
enum_list_style = "preserve"
field_list_align_body = false
field_list_body_on_new_line = 20
field_list_indent = 2
literal_indent = 2
paragraph_line_length = 70
paragraph_semantic_wrap = false
simple_table_space = 2
substitution_indent = 3
transition_char = "-"
transition_length = 10


# all needs configuration goes to then needs table;
# the varibles do not have the needs_ prefix in the name
[needs]
build_json = true

# Schema validation configuration
# see https://sphinx-needs.readthedocs.io/en/latest/schema/index.html
schema_definitions_from_json = "schemas.json"
schema_severity = "warning"
schema_debug_active = false

# Force the author to set an ID by hand.
# Otherwise Sphinx-Needs would create one based on the Need title.
# So a title change will change the ID and all set links will get invalid.
# Therefore setting a stable ID by hand is always a good idea.
# see https://sphinx-needs.readthedocs.io/en/latest/configuration.html#needs-id-required
id_required = true

# The format of a need gets defined here.
# see https://sphinx-needs.readthedocs.io/en/latest/configuration.html#needs-id-regex
id_regex = "[A-Z_]{3,10}(_[\\d]{1,3})*"

# allowed values for need status core field
# see https://sphinx-needs.readthedocs.io/en/latest/configuration.html#needs-statuses
# [[needs.statuses]]
# name = "open"
# description = "Open"

# [[needs.statuses]]
# name = "closed"
# description = "Closed"

# [[needs.statuses]]
# name = "passed"
# description = "Passed"


# Custom fields available for all need types.
# Replaces deprecated needs_extra_options and needs_global_options (v7 migration).
# see https://sphinx-needs.readthedocs.io/en/latest/configuration.html#needs-fields
[needs.fields.role]
nullable = true

[needs.fields.contact]
nullable = true

[needs.fields.image]
nullable = true

[needs.fields.date]
nullable = true

[needs.fields.customer]
nullable = true

[needs.fields.github]
nullable = true

[needs.fields.jira]
nullable = true
parse_variants = true

[needs.fields.config]
nullable = true

[needs.fields.number]
nullable = true

[needs.fields.effort]
description = "Story points (Fibonacci sequence)"

[needs.fields.effort.schema]
type = "integer"
enum = [1, 2, 3, 5, 8, 13, 21, 34]

[needs.fields.approved]
description = "Approval status of the requirement"

[needs.fields.approved.schema]
type = "boolean"

[needs.fields.asil]
description = "Automotive Safety Integrity Level (ISO 26262)"

[needs.fields.asil.schema]
type = "string"
enum = ["QM", "A", "B", "C", "D"]

[needs.fields.severity]
description = "Severity rating (S0-S3) for HARA"
nullable = true

[needs.fields.exposure]
description = "Exposure rating (E0-E4) for HARA"
nullable = true

[needs.fields.controllability]
description = "Controllability rating (C0-C3) for HARA"
nullable = true

[needs.fields.scenario]
description = "Operational scenario for hazard occurrence"
nullable = true

[needs.fields.safe_state]
description = "Target safe state for safety goal"
nullable = true

# Core field overrides for variant handling and global predicates
[needs.fields.status]
parse_variants = true

[needs.fields.constraints]
predicates = [
  [
    "type in ['req'] and docname is not None and 'automotive-adas' in docname",
    "status_set",
  ],
  [
    "type in ['req'] and docname is not None and 'automotive-adas' in docname",
    "release_set",
  ],
]

[needs.fields.layout]
predicates = [
  [
    "type in ['req']",
    "req_constraint",
  ],
  [
    "type in ['hazard', 'safety_goal', 'fsr', 'sysreq']",
    "safety",
  ],
  [
    "type not in ['req', 'hazard', 'safety_goal', 'fsr', 'sysreq']",
    "adas",
  ],
]

# see https://sphinx-needs.readthedocs.io/en/latest/configuration.html#needs-constraints
[needs.constraints.release_set]
check_0 = "len(release)>0"
error_message = "Requirement is not planned for any release!"
severity = "CRITICAL"

[needs.constraints.status_set]
check_0 = "status is not None and status in ['open', 'in progress', 'closed']"
error_message = "Status is invalid or not set!"
severity = "LOW"

[needs.constraints.hazard_asil_required]
check_0 = "asil is not None and asil in ['QM', 'A', 'B', 'C', 'D']"
error_message = "Hazard must have a valid ASIL assignment!"
severity = "CRITICAL"

[needs.constraints.safety_goal_asil_required]
check_0 = "asil is not None and asil in ['A', 'B', 'C', 'D']"
check_1 = "len(mitigates) > 0"
error_message = "Safety Goal must have ASIL (A-D) and link to at least one hazard!"
severity = "CRITICAL"

# see https://sphinx-needs.readthedocs.io/en/latest/configuration.html#needs-constraint-failed-options
[needs.constraint_failed_options.CRITICAL]
force_style = false
on_fail = ["warn"]
style = ["red_bar"]

[needs.constraint_failed_options.HIGH]
force_style = false
on_fail = ["warn"]
style = ["orange_bar"]

[needs.constraint_failed_options.LOW]
force_style = false
on_fail = []
style = ["blue_bar"]

[needs.constraint_failed_options.MEDIUM]
force_style = false
on_fail = ["warn"]
style = ["yellow_bar"]

# needs_variants allows to set specific option values based on the currently active variant.
# A use case is a different ``status``, depending on if the implementation needs to be done for
# customer A or customer B.
# In the rst-code, the variant-values can then be set like this:
# ``:status: customer_a:open, customer_b:closed``
# see https://sphinx-needs.readthedocs.io/en/latest/configuration.html#needs-variants
[needs.variants]
customer_a = "customer == 'A' or customer not in ['A', 'B']"
customer_b = "customer == 'B'"

