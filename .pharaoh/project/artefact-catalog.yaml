# child_of values are intentionally conservative: only listed where the
# corpus shows >=90% coverage AND the link semantics are child-to-parent
# (decomposition / refinement). Owner-style links (:author:, :persons:),
# planning links (:release:), and parent-to-child links (:provides:,
# :startup_calls:, :shutdown_calls:) are excluded even when their corpus
# coverage is high. Types with no qualifying parent get child_of: [].

req:
  required_fields:
    - id
    - status
  optional_fields:
    - source_doc
    - reviewer
    - approved_by
    - customer
    - approved
  child_of: []
  lifecycle_ref: workflows.yaml#req

